name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release APK
        env:
          KEYSTORE_PATH:     ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/hackerskeyboard-nightly-${DATE}.apk
          echo "APK_PATH=app/build/outputs/apk/release/hackerskeyboard-nightly-${DATE}.apk" >> "$GITHUB_ENV"
          echo "APK_NAME=hackerskeyboard-nightly-${DATE}.apk" >> "$GITHUB_ENV"

      - name: Publish nightly release
        uses: ncipollo/release-action@v1
        with:
          tag:             nightly
          name:            Nightly
          body:            "Automated nightly build from commit ${{ github.sha }}"
          prerelease:      true
          draft:           false
          allowUpdates:    true
          removeArtifacts: true
          artifacts:       ${{ env.APK_PATH }}
          token:           ${{ secrets.GITHUB_TOKEN }}
