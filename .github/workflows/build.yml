name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [labeled]

jobs:
  lint:
    if: github.event_name == 'push' || github.event.label.name == 'run-build'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11'

      - name: Run lint
        run: gradle lint

  build:
    if: github.event_name == 'push' || github.event.label.name == 'run-build'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11'

      - name: Build release APK
        run: gradle assembleRelease

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk

  sign:
    needs: build
    if: github.event_name == 'push' || github.event.label.name == 'run-build'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download unsigned APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-unsigned

      - name: Set up signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.keystore"

      - name: Zipalign and sign APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          "$BUILD_TOOLS_DIR/zipalign" -v -p 4 app-release-unsigned.apk app-release-aligned.apk
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out app-release.apk \
            app-release-aligned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app-release.apk

  pre-release:
    needs: sign
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download signed APK
        uses: actions/download-artifact@v4
        with:
          name: app-release

      - name: Publish nightly pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          APK_NAME="hackerskeyboard-nightly-${SHORT_SHA}.apk"
          mv app-release.apk "${APK_NAME}"
          gh release delete nightly --yes 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true
          gh release create nightly \
            --prerelease \
            --title "nightly ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes "Automated build from commit \`${{ github.sha }}\` on \`${{ github.ref_name }}\`." \
            "${APK_NAME}"
